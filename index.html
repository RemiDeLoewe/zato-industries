<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <meta http-equiv="refresh" content="3;url=https://deloewe.com/">
  
  <title>Zato Industries - Redirection</title>
  <link rel="icon" href="/public/images/zato-industries.ico" />
  <style>
    :root {
      --jade: #00a86b;
      --white: #ffffff;
      --gray-dark: #111111;
      --gray-medium: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: var(--gray-dark);
      color: var(--white);
      font-family: 'Segoe UI', sans-serif;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .logo { height: 80px; margin-bottom: 20px; }
    
    .loader {
      border: 4px solid #333;
      border-top: 4px solid var(--jade);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 { font-size: 1.5rem; margin-bottom: 10px; padding: 0 20px; }
    p { color: #888; }
    a { color: var(--jade); text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <img src="public/images/large-zato-industries-nobg.png" alt="Zato Industries Logo" class="logo">
  
  <h1>Zato Industries évolue.</h1>
  <p>Nous vous redirigeons vers <strong>deloewe.com</strong>...</p>
  
  <div class="loader"></div>

  <p style="margin-top: 20px; font-size: 0.9em;">
    Si la redirection ne fonctionne pas, <a href="https://deloewe.com/">cliquez ici</a>.
  </p>

</body>
</html>
